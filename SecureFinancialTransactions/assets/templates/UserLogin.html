{% extends 'base.html' %}
{% load static %}

{% block contents %}

<div class="bg-white rounded-lg shadow-md p-6">

    <p class="text-gray-700">
    <center>
        <h1 class="text-2xl font-semibold text-center">User Login Form</h1>
        <form action="{% url 'UserLoginCheck' %}" method="POST" class="space-y-6">
            {% csrf_token %}

            <div>
                <input type="text" name="loginid" required
                       placeholder="Enter Login ID"
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-black bg-white"/>
            </div>

            <div>
                <input type="password" name="pswd" required
                       placeholder="Enter Password"
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-black bg-white"/>
            </div>

            <div class="flex justify-center space-x-4">
                <button type="submit"
                        class="bg-indigo-600 text-white px-6 py-2 rounded-md hover:bg-indigo-700">
                    Login
                </button>&nbsp;&nbsp;
                <button type="reset"
                        class="bg-gray-400 text-white px-6 py-2 rounded-md hover:bg-gray-500">
                    Reset
                </button>
            </div>

            {% if messages %}
            <div class="text-green-600 text-center mt-4">
                {% for message in messages %}
                {{ message }}
                {% endfor %}
            </div>
            {% endif %}
        </form>
    </center>
    </p>
</div>

{% endblock %}
