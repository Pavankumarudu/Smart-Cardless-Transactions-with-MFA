{% extends 'users/userbase.html' %}
{% load static %}

{% block contents %}
<div class="min-h-screen flex items-center justify-center bg-gray-100">

    <div class="w-full max-w-xl bg-white p-8 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold text-center text-green-700 mb-6">Send Money</h2>

        <form action="{% url 'user_transaction' %}" method="POST" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block mb-1 font-medium text-gray-700">Your User ID</label>
                <input type="text" name="sender_id" readonly
                       placeholder="Your ID" value="{{loginid}}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"/>
            </div>

            <div>
                <label class="block mb-1 font-medium text-gray-700">Recipient User ID</label>
                <select name="recipient_id" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="">Select Recipient Users</option>
                    {% for i in users %}
                    <option value={{i}}>{{i}}</option>
                    {%endfor%}
                </select>
            </div>

            <div>
                <label class="block mb-1 font-medium text-gray-700">Amount to Send</label>
                <input type="number" name="amount" required step="0.01" min="1"
                       placeholder="e.g., 250.00"
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"/>
            </div>


            <div>
                <label class="block mb-1 font-medium text-gray-700">Remarks (optional)</label>
                <textarea name="remarks" rows="3"
                          placeholder="Purpose or note..."
                          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
            </div>

            <div class="flex justify-center space-x-4 mt-6">
                <button type="submit"
                        class="bg-green-600 text-white px-6 py-2 rounded-md hover:bg-green-700 font-medium">
                    Send Money
                </button>&nbsp;&nbsp;&nbsp;
                <button type="reset"
                        class="bg-gray-400 text-white px-6 py-2 rounded-md hover:bg-gray-500 font-medium">
                    Reset
                </button>
            </div>

            {% if messages %}
            <div class="text-center text-red-600 mt-4">
                {% for message in messages %}
                {{ message }}
                {% endfor %}
            </div>
            {% endif %}
        </form>
<h3>{{msg}}</h3>
    </div>
</div>
{% endblock %}
